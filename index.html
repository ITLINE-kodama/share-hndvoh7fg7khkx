<title>ご提案資料</title>
<style>
  :root{ --ink:#1f2733; --sub:#6b7686; --line:#e7ebf0; --accent:#2f6df0; --bg:#f5f7fb; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.6}
  .wrap{max-width:760px;margin:0 auto;padding:64px 20px 80px}
  .brand{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;margin:0 0 10px}
  h1{font-size:30px;letter-spacing:.02em;margin:0 0 6px}
  .lead{color:var(--sub);font-size:14px;margin:0 0 32px}
  .cards{display:grid;gap:14px}
  .card{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--line);
    border-radius:14px;padding:18px 20px;text-decoration:none;color:inherit;
    box-shadow:0 1px 2px rgba(20,30,50,.04);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(20,40,90,.10);border-color:#cfd9ea}
  .ic{font-size:26px;line-height:1;flex:0 0 auto;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#eef3ff,#f7f9ff);border-radius:11px}
  .tx{display:flex;flex-direction:column;min-width:0;flex:1}
  .kind{font-size:11px;letter-spacing:.08em;color:var(--accent);font-weight:700}
  .name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .go{color:var(--sub);font-size:13px;font-weight:600;flex:0 0 auto}
  .card:hover .go{color:var(--accent)}
  .card.feature{border-color:var(--accent);border-width:2px;background:linear-gradient(180deg,#ffffff,#f5f9ff);box-shadow:0 8px 24px rgba(31,109,240,.13)}
  .card.feature .ic{background:linear-gradient(135deg,#e3edff,#f0f6ff)}
  .tagfeat{display:inline-block;margin-left:8px;font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--accent);padding:2px 9px;border-radius:999px;vertical-align:middle}
  .acts{display:flex;align-items:center;gap:12px;flex:0 0 auto}
  .acts .go{text-decoration:none}
  .dl{font-size:12px;font-weight:700;color:#fff;background:var(--accent);padding:7px 13px;border-radius:8px;text-decoration:none;white-space:nowrap}
  .dl:hover{opacity:.88}
  .foot{margin-top:40px;color:#9aa4b2;font-size:12px;text-align:center}
  .prep{margin-top:38px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px 22px;box-shadow:0 1px 2px rgba(20,30,50,.04)}
  .prep-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
  .prep-head h2{font-size:18px;margin:0}
  .prep-prog{font-size:12px;font-weight:700;color:var(--accent);background:#eef3ff;padding:5px 12px;border-radius:999px;white-space:nowrap}
  .prep-lead{color:var(--sub);font-size:13px;margin:0 0 16px}
  .prep-list{list-style:none;margin:0;padding:0;display:grid;gap:9px}
  .pi{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:#fcfdff}
  .pi-dot{flex:0 0 auto;width:10px;height:10px;border-radius:50%;background:#cbd3df}
  .pi.done .pi-dot{background:#16a34a}
  .pi.partial .pi-dot{background:#d97706}
  .pi-tx{display:flex;flex-direction:column;min-width:0;flex:1}
  .pi-tx b{font-size:14.5px;font-weight:600}
  .pi-tx small{font-size:12px;color:var(--sub);margin-top:1px}
  .pi-badge{flex:0 0 auto;font-size:11px;font-weight:700;padding:4px 11px;border-radius:999px;background:#eef1f5;color:#7a8696}
  .pi.done .pi-badge{background:#e7f6ec;color:#16a34a}
  .pi.partial .pi-badge{background:#fdf0dd;color:#b97309}
  .req{display:inline-block;margin-left:8px;font-size:10px;font-weight:700;color:#c0392b;background:#fdeaea;border:1px solid #f3c9c9;padding:1px 7px;border-radius:999px;vertical-align:middle}
  .pi.is-req{border-color:#f3c9c9;background:#fffafa}
  .prep-note{color:#9aa4b2;font-size:11.5px;margin:14px 0 0}
</style></head>
